packages:
  - .

allowBuilds:
  esbuild: false
  sharp: false
  unrs-resolver: false

minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - uuid@14.0.0
  - postcss@8.5.10

overrides:
  chokidar: '>=5'
  eslint-import-resolver-typescript: '^4.4.4'
  jose: '>=6'
  postcss@<8.5.10: ^8.5.10
  semver: '>=7'
  uuid@<14.0.0: ^14.0.0

trustPolicy: no-downgrade
